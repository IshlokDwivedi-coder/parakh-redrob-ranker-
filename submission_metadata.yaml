# ============================================================================
# AI tools declaration (transparency — not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, code review, and to
  scaffold/iterate the Java implementation. All design decisions, the scoring
  methodology, and the feature weights are my own engineering. No candidate data
  was ever sent to any LLM — the ranker is pure deterministic Java and makes no
  network calls during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  PARAKH is a transparent, deterministic, network-free Java/Spring ranker — no
  embeddings, no ML weights. A panel of explainable scorers each contributes a
  named, bounded component: CareerRelevance (title+trajectory, the decisive
  anti-keyword-stuffing signal), SkillTrust (skill match weighted by endorsements
  /duration/assessment, defeating padded skill lists), DomainProduct
  (product-vs-services, NLP/IR-vs-CV), ExperienceFit, Location, and EvalSignal.
  A multiplicative DisqualifierPenalizer applies the JD's explicit
  disqualifiers, and an AvailabilityModifier down-weights inactive candidates. A
  HoneypotGate forces impossible/contradictory profiles out of the top 100
  before scoring (DQ-prevention). Reasoning text is assembled only from real
  profile fields, so hallucination is impossible. It streams candidates.jsonl
  through a size-100 min-heap: 100,000 candidates ranked in ~22s using ~0.28GB
  peak RAM, far inside the 5-min / 16GB / CPU-only / no-network budget.

# ============================================================================
